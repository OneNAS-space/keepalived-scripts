permissions:
  contents: write
name: Build OpenWrt Package

on:
  push:
    branches:
      - main
    paths:
      - 'Makefile'
      - 'files/**'
      - '!**/.github/**'
  workflow_dispatch:

jobs:
  check:
    name: 1. Resolve Version
    runs-on: ubuntu-latest
    outputs:
      resolved_tag: ${{ steps.resolve.outputs.resolved_tag }}
      should_build: ${{ steps.resolve.outputs.should_build }}
    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: resolve
        run: |
          REL=""
          SHOULD_BUILD="true"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            REL="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || echo "Makefile")
            if echo "$CHANGED" | grep -Eq '^(Makefile|files/)'; then
              if echo "$CHANGED" | grep -Eq '^files/'; then
                CUR_VER=$(grep -E '^PKG_VERSION:=' Makefile | cut -d= -f2 | sed 's/#.*//' | tr -d '[:space:]')
                IFS='.' read -r major minor patch <<< "$CUR_VER"
                patch=$((patch + 1))
                NEW_VER="${major}.${minor}.${patch}"
                sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${NEW_VER}/" Makefile
                
                git config user.name "github-actions[bot]"
                git config user.email "github-actions[bot]@users.noreply.github.com"
                git add Makefile
                git commit -m "ci: bump PKG_VERSION to ${NEW_VER} [skip ci]" || true
                git push origin HEAD:main || true
              fi
            else
              if [[ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]]; then
                SHOULD_BUILD="false"
              fi
            fi
          fi

          V=$(grep -E '^PKG_VERSION:=' Makefile | cut -d= -f2 | tr -d '[:space:]')
          R=$(grep -E '^PKG_RELEASE:=' Makefile | cut -d= -f2 | tr -d '[:space:]')
          [[ -z "$REL" ]] && REL="v${V}-r${R}"

          echo "resolved_tag=$REL" >> "$GITHUB_OUTPUT"
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"

  build:
    name: 2. Build for keepalived-scripts
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: openwrt-24.10
            target: x86_64
            suffix: all
          - version: openwrt-25.12
            target: x86_64
            suffix: noarch

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📛 Set Environment
        run: |
          echo "PKG_NAME=${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          echo "ARCH=${{ matrix.target }}-${{ matrix.version }}" >> "$GITHUB_ENV"

      - name: 🧰 Set up keepalived-scripts feed structure
        run: |
          set -e
          mkdir -p feed/onenas
          printf 'include $(TOPDIR)/feed/onenas/*/Makefile\n' > feed/onenas/custom.mk

          rsync -av \
            --exclude='.git' \
            --exclude='feed' \
            --exclude='.github' \
            --exclude='LICENSE' \
            --exclude='README.md' \
            --exclude='SECURITY.md' \
            ./ feed/onenas/${PKG_NAME}/

      - name: 🏗️ Build with OpenWrt SDK
        uses: openwrt/gh-action-sdk@v10
        env:
          ARCH: ${{ env.ARCH }}
          FEEDNAME: onenas
          PACKAGES: ${{ env.PKG_NAME }}
          INDEX: 0
          FEED_DIR: ${{ github.workspace }}/feed
          NO_SHFMT_CHECK: 1
          NO_REFRESH_CHECK: 1
          
      - name: 🔍 Debug build output
        run: |
          echo "=== Build directory structure ==="
          find . -name "*.ipk" -type f 2>/dev/null || echo "No .ipk files found"
          echo "=== bin directory structure ==="
          ls -la bin/ 2>/dev/null || echo "No bin directory found"
          if [ -d "bin/packages" ]; then
            echo "=== packages directory structure ==="
            find bin/packages/ -type f -name "*.ipk" 2>/dev/null || echo "No .ipk files in packages directory"
            echo "=== Full packages directory tree ==="
            ls -laR bin/packages/ 2>/dev/null || echo "No packages directory"
          fi

      - name: 📦 Upload artifact for ${{ matrix.target }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PKG_NAME }}-${{ matrix.target }}-${{ matrix.version }}
          path: |
            bin/packages/*/onenas/${{ env.PKG_NAME }}*.ipk
            bin/packages/*/onenas/${{ env.PKG_NAME }}*.apk
          if-no-files-found: ignore

  release:
    name: 3. Release & Deploy ${{ github.repository }}
    needs: [check, build]
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout repo
        uses: actions/checkout@v6

      - name: ⬇️ Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./release-assets

      - name: 🗃️ Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.check.outputs.resolved_tag }}
          name: Build-${{ needs.check.outputs.resolved_tag }}
          files: |
            ./release-assets/**/*.ipk
            ./release-assets/**/*.apk
          draft: false
          prerelease: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔑 Checkout custom-packages repo
        uses: actions/checkout@v6
        with:
          repository: OneNAS-space/custom-packages
          token: ${{ secrets.CUSTOM_PACKAGES_TOKEN }}
          path: custom-packages

      - name: 🚚 Update common artifacts
        run: |
          set -e
          CURRENT_PKG="${{ github.event.repository.name }}"
          mkdir -p custom-packages/releases/packages-24.10/common custom-packages/releases/packages-25.12/common

          echo "Cleaning all old versions for $CURRENT_PKG before updating..."
          rm -f custom-packages/releases/packages-24.10/common/${CURRENT_PKG}_*.ipk
          rm -f custom-packages/releases/packages-25.12/common/${CURRENT_PKG}-*.apk

          find ./release-assets -type f \( -name "*.ipk" -o -name "*.apk" \) | while read -r f; do
            base=$(basename "$f")
            if [[ "$base" == *.ipk ]]; then
              echo "Deploying $base to releases/packages-24.10/common/"
              cp "$f" custom-packages/releases/packages-24.10/common/
            elif [[ "$base" == *.apk ]]; then
              echo "Deploying $base to releases/packages-25.12/common/"
              cp "$f" custom-packages/releases/packages-25.12/common/
            fi
          done
          echo "=== 24.10 Content ==="
          ls -la custom-packages/releases/packages-24.10/common/${CURRENT_PKG}* || echo "No IPKs found"
          echo "=== 25.12 Content ==="
          ls -la custom-packages/releases/packages-25.12/common/${CURRENT_PKG}* || echo "No APKs found"

          cd custom-packages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases/packages-24.10/common/ releases/packages-25.12/common/ 2>/dev/null || true
          git commit -m "Update $CURRENT_PKG to ${{ needs.check.outputs.resolved_tag }}" || exit 0
          
          for i in {1..5}; do
            git pull --rebase origin main && \
            git push origin main && break || \
            (echo "Conflict detected, retrying in 5s..." && sleep 5)
          done
